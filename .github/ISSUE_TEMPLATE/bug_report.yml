name: Bug Report
description: Report incorrect attribute resolution, a crash, or other unexpected behavior.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the exact query/phrase sent to `/query/evaluate` or `/query/search`, and the expected vs. actual attribute resolution.
      placeholder: |
        Input: "diabetic patients over 65 with elevated HbA1c"
        Expected: "over 65" -> patient.age
        Actual: "over 65" -> labs.hba1c
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Provider configuration
      description: LLM / embedding / search backend in use (from `/health/providers` or your `.env`).
      placeholder: |
        LLM: openai (gpt-4o-mini)
        Embedding: openai (text-embedding-3-small)
        Search: local
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse HEAD`, or the release tag.
    validations:
      required: false
